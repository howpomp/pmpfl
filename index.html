<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pompano Beach Home Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#060d14;--bg2:#0b1724;--bg3:#111f2e;--border:#1a3048;
    --accent:#00aaff;--accent2:#00d4aa;
    --warn-red:#ff3b3b;--warn-orange:#ff8800;--warn-yellow:#ffd600;--warn-blue:#4488ff;
    --text:#ddeeff;--text-dim:#6a8faa;--text-bright:#ffffff;
    --vfr:#00cc44;--mvfr:#3388ff;--ifr:#ff3344;--lifr:#cc44ff;
    --radius:4px;
    --font-main:'Rajdhani',sans-serif;--font-mono:'Share Tech Mono',monospace;--font-cond:'Barlow Condensed',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-main);min-height:100vh;overflow-x:hidden}

  /* HEADER */
  #header{background:linear-gradient(180deg,#0a1f33 0%,var(--bg2) 100%);border-bottom:2px solid var(--accent);padding:0 16px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;flex-wrap:nowrap;overflow:hidden}
  #header-title{font-family:var(--font-cond);font-size:1.05rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:2px;white-space:nowrap;flex-shrink:0}
  #header-divider{width:1px;height:30px;background:var(--border);flex-shrink:0}
  #chips{display:flex;gap:6px;flex:1;flex-wrap:nowrap;overflow:hidden}
  .chip{display:flex;flex-direction:column;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:2px 8px;min-width:52px;flex-shrink:0}
  .chip-label{font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
  .chip-val{font-family:var(--font-mono);font-size:0.85rem;color:var(--text-bright);line-height:1.1}
  .chip-val.vfr{color:var(--vfr)}.chip-val.mvfr{color:var(--mvfr)}.chip-val.ifr{color:var(--ifr)}.chip-val.lifr{color:var(--lifr)}
  #header-clock{font-family:var(--font-mono);font-size:0.85rem;color:var(--accent);white-space:nowrap;flex-shrink:0;text-align:right}
  #header-clock span{display:block;font-size:0.6rem;color:var(--text-dim)}

  /* LAYOUT */
  #main{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 10px 0}
  .panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .panel-title{font-family:var(--font-cond);font-size:0.7rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);padding:6px 12px;border-bottom:1px solid var(--border);background:rgba(0,170,255,0.05);display:flex;align-items:center;justify-content:space-between}

  /* RADAR */
  #radar-panel{grid-column:1}
  #alerts-panel{grid-column:2}
  #radar-container{position:relative;width:100%;height:360px;background:#050e18}
  #radar-map{width:100%;height:100%}
  #radar-timestamp{position:absolute;bottom:6px;left:6px;background:rgba(6,13,20,0.85);font-family:var(--font-mono);font-size:0.65rem;color:var(--accent);padding:2px 6px;border-radius:2px;z-index:10}
  #radar-play-btn{position:absolute;bottom:6px;right:6px;background:rgba(0,170,255,0.2);border:1px solid var(--accent);color:var(--accent);font-family:var(--font-mono);font-size:0.7rem;padding:3px 10px;border-radius:2px;cursor:pointer;z-index:10}
  #radar-play-btn:hover{background:rgba(0,170,255,0.35)}

  /* ALERTS */
  #alerts-body{height:360px;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:5px}
  #alerts-body::-webkit-scrollbar{width:4px}
  #alerts-body::-webkit-scrollbar-track{background:var(--bg)}
  #alerts-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .alert-card{border-radius:var(--radius);padding:7px 10px;border-left:3px solid;background:rgba(255,255,255,0.03)}
  .alert-card.warning{border-color:var(--warn-red)}.alert-card.watch{border-color:var(--warn-orange)}.alert-card.advisory{border-color:var(--warn-yellow)}.alert-card.statement{border-color:var(--warn-blue)}
  .alert-event{font-family:var(--font-cond);font-weight:700;font-size:0.85rem;color:var(--text-bright);text-transform:uppercase;letter-spacing:0.5px}
  .alert-meta{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);margin-top:2px}
  .alert-area{font-size:0.72rem;color:var(--text);margin-top:3px;line-height:1.3}
  .alert-badge{display:inline-block;font-family:var(--font-mono);font-size:0.55rem;padding:1px 5px;border-radius:2px;margin-right:4px;text-transform:uppercase;font-weight:bold}
  .badge-warning{background:rgba(255,59,59,0.25);color:var(--warn-red);border:1px solid var(--warn-red)}
  .badge-watch{background:rgba(255,136,0,0.2);color:var(--warn-orange);border:1px solid var(--warn-orange)}
  .badge-advisory{background:rgba(255,214,0,0.15);color:var(--warn-yellow);border:1px solid var(--warn-yellow)}
  .badge-statement{background:rgba(68,136,255,0.15);color:var(--warn-blue);border:1px solid var(--warn-blue)}
  #alerts-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--vfr);font-family:var(--font-cond);font-size:1rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;flex-direction:column;gap:6px}
  #alerts-empty .big{font-size:2rem}
  .alert-count-badge{background:var(--warn-red);color:#fff;border-radius:10px;padding:1px 7px;font-size:0.65rem;font-family:var(--font-mono);animation:pulse-red 2s infinite}
  @keyframes pulse-red{0%,100%{opacity:1}50%{opacity:0.6}}
  .no-alerts-badge{background:rgba(0,204,68,0.2);color:var(--vfr);border-radius:10px;padding:1px 7px;font-size:0.65rem;font-family:var(--font-mono);border:1px solid var(--vfr)}

  /* CAROUSEL */
  #carousel-wrap{grid-column:1/-1;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  #carousel-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,170,255,0.04)}
  .c-tab{flex:1;padding:9px 14px;font-family:var(--font-cond);font-size:0.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;display:flex;align-items:center;gap:8px;transition:color 0.2s,border-color 0.2s;position:relative;overflow:hidden}
  .c-tab:hover{color:var(--text)}
  .c-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .c-tab-progress{position:absolute;bottom:0;left:0;height:2px;background:rgba(0,170,255,0.4);width:0%}
  #carousel-body{position:relative}
  .c-panel{display:none;animation:fadeIn 0.3s ease}
  .c-panel.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

  /* FORECAST CARDS */
  #forecast-cards{display:flex;gap:6px;padding:10px;overflow-x:auto}
  #forecast-cards::-webkit-scrollbar{height:3px}
  #forecast-cards::-webkit-scrollbar-thumb{background:var(--border)}
  .fc-card{flex:1;min-width:88px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px 6px;text-align:center;display:flex;flex-direction:column;gap:4px}
  .fc-card.tonight{border-color:rgba(0,170,255,0.3)}
  .fc-period{font-family:var(--font-cond);font-size:0.65rem;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
  .fc-temp{font-family:var(--font-mono);font-size:1.4rem;color:var(--text-bright);font-weight:bold}
  .fc-icon{font-size:1.6rem}
  .fc-desc{font-size:0.65rem;color:var(--text);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
  .fc-pop{font-family:var(--font-mono);font-size:0.65rem;color:var(--accent2)}

  /* AIRPORTS */
  #airports-body{padding:8px 10px}
  .airport-tier-label{font-family:var(--font-cond);font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px;margin-top:4px;padding-left:2px}
  .airport-grid{display:grid;gap:6px;margin-bottom:8px}
  .airport-grid.primary{grid-template-columns:repeat(6,1fr)}
  .airport-grid.secondary{grid-template-columns:repeat(6,1fr)}
  .apt-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 9px;border-top:2px solid}
  .apt-card.vfr{border-top-color:var(--vfr)}.apt-card.mvfr{border-top-color:var(--mvfr)}.apt-card.ifr{border-top-color:var(--ifr)}.apt-card.lifr{border-top-color:var(--lifr)}.apt-card.unknown{border-top-color:var(--border)}
  .apt-id{font-family:var(--font-mono);font-size:0.82rem;color:var(--text-bright);font-weight:bold}
  .apt-cat{font-family:var(--font-mono);font-size:0.65rem;font-weight:bold;margin-left:6px}
  .apt-cat.vfr{color:var(--vfr)}.apt-cat.mvfr{color:var(--mvfr)}.apt-cat.ifr{color:var(--ifr)}.apt-cat.lifr{color:var(--lifr)}
  .apt-row1{display:flex;align-items:baseline}
  .apt-name{font-size:0.58rem;color:var(--text-dim);margin-top:1px}
  .apt-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:5px}
  .apt-stat{font-family:var(--font-mono);font-size:0.6rem;color:var(--text)}
  .apt-stat span{color:var(--text-dim);font-size:0.55rem}
  .apt-sky{font-size:0.6rem;color:var(--text-dim);margin-top:3px}

  /* ENSEMBLE */
  #ensemble-body{padding:14px 16px}
  .ens-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .ens-day{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 14px;text-align:center;display:flex;flex-direction:column;gap:12px}
  .ens-day-label{font-family:var(--font-cond);font-size:1.15rem;font-weight:700;color:var(--text-bright);text-transform:uppercase;letter-spacing:2px}
  .ens-date{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-dim)}
  .ens-temps{display:flex;justify-content:center;gap:20px}
  .ens-temp-col{display:flex;flex-direction:column;align-items:center;gap:3px}
  .ens-col-label{font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
  .ens-val{font-family:var(--font-mono);font-size:2rem;font-weight:bold;color:var(--text-bright);line-height:1}
  .ens-val.hot{color:#ff7733}.ens-val.warm{color:#ffcc44}.ens-val.cool{color:#44aaff}
  .ens-conf{display:inline-block;font-family:var(--font-mono);font-size:0.5rem;padding:1px 5px;border-radius:2px;letter-spacing:1px}
  .conf-high{background:rgba(0,204,68,0.2);color:var(--vfr);border:1px solid var(--vfr)}
  .conf-med{background:rgba(255,214,0,0.15);color:var(--warn-yellow);border:1px solid var(--warn-yellow)}
  .conf-low{background:rgba(255,59,59,0.15);color:var(--warn-red);border:1px solid var(--warn-red)}
  .ens-pop{font-family:var(--font-mono);font-size:1.6rem;font-weight:bold}
  .ens-pop.pop-hi{color:var(--warn-orange)}.ens-pop.pop-mid{color:var(--accent2)}.ens-pop.pop-lo{color:var(--text-dim)}
  .ens-pop-label{font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dim)}
  #ens-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim)}
  #ens-link{color:var(--accent);text-decoration:none;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg3)}
  #ens-link:hover{border-color:var(--accent)}

  /* FOOTER */
  #footer{display:flex;justify-content:space-between;align-items:center;padding:6px 16px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);margin:10px;background:var(--bg2);border-radius:var(--radius)}

  /* SHIMMER */
  .shimmer{background:linear-gradient(90deg,var(--bg3) 25%,var(--border) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:3px;min-height:14px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<div id="header">
  <div id="header-title">📡 PMPFL · Pompano Beach</div>
  <div id="header-divider"></div>
  <div id="chips">
    <div class="chip"><span class="chip-label">TEMP</span><span class="chip-val" id="chip-temp">--</span></div>
    <div class="chip"><span class="chip-label">DEW PT</span><span class="chip-val" id="chip-dew">--</span></div>
    <div class="chip"><span class="chip-label">WIND</span><span class="chip-val" id="chip-wind">--</span></div>
    <div class="chip"><span class="chip-label">GUSTS</span><span class="chip-val" id="chip-gust">--</span></div>
    <div class="chip"><span class="chip-label">HUMID</span><span class="chip-val" id="chip-humid">--</span></div>
    <div class="chip"><span class="chip-label">BARO</span><span class="chip-val" id="chip-baro">--</span></div>
    <div class="chip"><span class="chip-label">VIS</span><span class="chip-val" id="chip-vis">--</span></div>
    <div class="chip"><span class="chip-label">FLT CAT</span><span class="chip-val" id="chip-fltcat">--</span></div>
  </div>
  <div id="header-clock">
    <div id="clock-time">--:-- --</div>
    <span id="clock-date">--- -- ----</span>
  </div>
</div>

<div id="main">
  <!-- RADAR -->
  <div class="panel" id="radar-panel">
    <div class="panel-title">
      NWS RADAR · South Florida
      <span id="radar-anim-status" style="color:var(--text-dim);font-size:0.6rem;font-family:var(--font-mono)">Loading…</span>
    </div>
    <div id="radar-container">
      <canvas id="radar-map"></canvas>
      <div id="radar-timestamp">--:-- EDT</div>
      <button id="radar-play-btn" onclick="toggleRadarPlayback()">⏸ PAUSE</button>
    </div>
  </div>

  <!-- ALERTS -->
  <div class="panel" id="alerts-panel">
    <div class="panel-title">
      FL LAND ALERTS
      <span id="alerts-count-badge" class="no-alerts-badge">NONE ACTIVE</span>
    </div>
    <div id="alerts-body">
      <div class="shimmer" style="height:60px"></div>
      <div class="shimmer" style="height:60px;margin-top:6px"></div>
    </div>
  </div>

  <!-- CAROUSEL -->
  <div id="carousel-wrap">
    <div id="carousel-tabs">
      <button class="c-tab active" onclick="goToSlide(0)" id="tab-0">
        ✈&nbsp; Airport Conditions
        <div class="c-tab-progress" id="prog-0"></div>
      </button>
      <button class="c-tab" onclick="goToSlide(1)" id="tab-1">
        🌡&nbsp; Ensemble Forecast
        <div class="c-tab-progress" id="prog-1"></div>
      </button>
      <button class="c-tab" onclick="goToSlide(2)" id="tab-2">
        📅&nbsp; 7-Day Forecast
        <div class="c-tab-progress" id="prog-2"></div>
      </button>
    </div>
    <div id="carousel-body">
      <div class="c-panel active" id="slide-0">
        <div id="airports-body"><div class="shimmer" style="height:220px;margin:10px"></div></div>
      </div>
      <div class="c-panel" id="slide-1">
        <div id="ensemble-body"><div class="shimmer" style="height:220px;margin:10px"></div></div>
      </div>
      <div class="c-panel" id="slide-2">
        <div id="forecast-cards"><div class="shimmer" style="height:220px;margin:10px;width:calc(100% - 20px)"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="footer">
  <span>Data: NWS · NOAA · Open-Meteo</span>
  <span>Carousel: 15s rotation · Data: 5 min refresh</span>
  <span id="footer-updated">Last updated: --</span>
</div>

<script>
'use strict';

const KPMP_STATION='KPMP', KPMP_LAT=26.247, KPMP_LON=-80.111;
const NWS_GRID_WFO='MFL', NWS_GRID_X=110, NWS_GRID_Y=37;
const REFRESH_MS=5*60*1000, CAROUSEL_MS=15000, NUM_SLIDES=3;

const SOUTH_FL=[
  {id:'KFLL',name:'Ft. Lauderdale Intl'},{id:'KMIA',name:'Miami Intl'},
  {id:'KPBI',name:'Palm Beach Intl'},{id:'KBCT',name:'Boca Raton'},
  {id:'KOPF',name:'Opa-locka'},{id:'KTMB',name:'Homestead / Tamiami'},
];
const STATE_FL=[
  {id:'KTPA',name:'Tampa Intl'},{id:'KMCO',name:'Orlando Intl'},
  {id:'KJAX',name:'Jacksonville Intl'},{id:'KTLH',name:'Tallahassee'},
  {id:'KPNS',name:'Pensacola Intl'},{id:'KEYW',name:'Key West Intl'},
];

// ── UTILS ────────────────────────────────────────────────────────────────────
const fetchT=(url,ms=12000)=>{const c=new AbortController(),id=setTimeout(()=>c.abort(),ms);return fetch(url,{signal:c.signal}).finally(()=>clearTimeout(id))};
const cToF=c=>Math.round(c*9/5+32);
const m2mi=m=>(m/1609.34).toFixed(1);
const pa2hg=p=>(p*0.0002953).toFixed(2);
function compass(d){const a=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return a[Math.round(d/22.5)%16]||'--'}
function toMph(v,u){if(v==null)return null;if(u&&(u.includes('km_h')||u.includes('km/h')))return Math.round(v*0.621371);return Math.round(v*2.23694)}
function flightCat(ceil,vis){if(ceil<500||vis<1)return 'lifr';if(ceil<1000||vis<3)return 'ifr';if(ceil<3000||vis<5)return 'mvfr';return 'vfr'}
function getCeil(sky){if(!sky)return 99999;const b=sky.filter(l=>['BKN','OVC'].includes(l.skyCover));return b.length?Math.min(...b.map(l=>l.base?.value??99999))*3.28084:99999}

// ── CLOCK ────────────────────────────────────────────────────────────────────
function tickClock(){
  const n=new Date();
  document.getElementById('clock-time').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('clock-date').textContent=n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
setInterval(tickClock,1000);tickClock();

// ── CAROUSEL ─────────────────────────────────────────────────────────────────
let curSlide=0, carTimer=null;

function goToSlide(idx){
  document.querySelectorAll('.c-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.querySelectorAll('.c-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  // reset all progress bars
  for(let i=0;i<NUM_SLIDES;i++){
    const el=document.getElementById('prog-'+i);
    if(el){el.style.transition='none';el.style.width='0%';void el.offsetWidth;}
  }
  curSlide=idx;
  // animate current
  const prog=document.getElementById('prog-'+idx);
  if(prog){void prog.offsetWidth;prog.style.transition=`width ${CAROUSEL_MS}ms linear`;prog.style.width='100%';}
  clearInterval(carTimer);
  carTimer=setInterval(()=>goToSlide((curSlide+1)%NUM_SLIDES),CAROUSEL_MS);
}

setTimeout(()=>goToSlide(0),200);

// ── CHIPS ────────────────────────────────────────────────────────────────────
async function loadChips(){
  try{
    const p=(await(await fetchT(`https://api.weather.gov/stations/${KPMP_STATION}/observations/latest`)).json()).properties;
    const wMph=toMph(p.windSpeed?.value,p.windSpeed?.unitCode);
    const gMph=toMph(p.windGust?.value,p.windGust?.unitCode);
    const vis=p.visibility?.value,sky=p.cloudLayers;
    const visMi=vis!=null?parseFloat(m2mi(vis)):99;
    const cat=flightCat(getCeil(sky),visMi);
    document.getElementById('chip-temp').textContent=p.temperature?.value!=null?cToF(p.temperature.value)+'°F':'--';
    document.getElementById('chip-dew').textContent=p.dewpoint?.value!=null?cToF(p.dewpoint.value)+'°F':'--';
    document.getElementById('chip-wind').textContent=wMph!=null?`${compass(p.windDirection?.value??0)} ${wMph}mph`:'--';
    document.getElementById('chip-gust').textContent=gMph!=null?gMph+'mph':'None';
    document.getElementById('chip-humid').textContent=p.relativeHumidity?.value!=null?Math.round(p.relativeHumidity.value)+'%':'--';
    document.getElementById('chip-baro').textContent=p.seaLevelPressure?.value!=null?pa2hg(p.seaLevelPressure.value)+'"':'--';
    document.getElementById('chip-vis').textContent=vis!=null?m2mi(vis)+'mi':'--';
    const ce=document.getElementById('chip-fltcat');ce.textContent=cat.toUpperCase();ce.className='chip-val '+cat;
  }catch(e){console.warn('chips',e)}
}

// ── RADAR ────────────────────────────────────────────────────────────────────
const WMS='https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/ows';
const BMINX=-83.5,BMINY=24.5,BMAXX=-79.5,BMAXY=27.5,RW=760,RH=360;
let rImgs=[],rPlay=true,rIdx=0,rTimer=null,rCtx,rCvs,rBg;

function wmsUrl(t){return `${WMS}?service=WMS&version=1.3.0&request=GetMap&layers=conus_bref_qcd&styles=&crs=EPSG:4326&bbox=${BMINY},${BMINX},${BMAXY},${BMAXX}&width=${RW}&height=${RH}&format=image/png&transparent=true&time=${t}`}
function imgLoad(src){return new Promise((ok,fail)=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>ok(i);i.onerror=()=>fail();i.src=src})}

async function initRadar(){
  rCvs=document.getElementById('radar-map');rCvs.width=RW;rCvs.height=RH;
  rCtx=rCvs.getContext('2d');rCtx.fillStyle='#050e18';rCtx.fillRect(0,0,RW,RH);
  try{rBg=await imgLoad(`https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/export?bbox=${BMINX},${BMINY},${BMAXX},${BMAXY}&bboxSR=4326&size=${RW},${RH}&format=png&f=image`)}catch(e){rBg=null}
  await fetchRadar();
}

async function fetchRadar(){
  document.getElementById('radar-anim-status').textContent='Loading…';
  const now=new Date(),times=[];
  for(let i=5;i>=0;i--){const t=new Date(now-i*10*60*1000);t.setMinutes(Math.floor(t.getMinutes()/10)*10,0,0);times.push(t.toISOString().replace('.000',''))}
  const loaded=[];
  for(const t of times){try{loaded.push({img:await imgLoad(wmsUrl(t)),time:t})}catch(e){}}
  if(!loaded.length){document.getElementById('radar-anim-status').textContent='⚠ No Data';return}
  rImgs=loaded;rIdx=0;
  document.getElementById('radar-anim-status').textContent=`${loaded.length} frames`;
  if(rTimer)clearInterval(rTimer);
  if(rPlay)startRadar();else drawFrame(0);
}

function drawFrame(i){
  if(!rImgs.length)return;
  const{img,time}=rImgs[i];
  rCtx.fillStyle='#050e18';rCtx.fillRect(0,0,RW,RH);
  if(rBg)rCtx.drawImage(rBg,0,0,RW,RH);
  rCtx.drawImage(img,0,0,RW,RH);
  const mx=Math.round(((KPMP_LON-BMINX)/(BMAXX-BMINX))*RW);
  const my=Math.round(((BMAXY-KPMP_LAT)/(BMAXY-BMINY))*RH);
  rCtx.beginPath();rCtx.arc(mx,my,5,0,Math.PI*2);rCtx.fillStyle='#ff4444';rCtx.fill();
  rCtx.strokeStyle='#fff';rCtx.lineWidth=1.5;rCtx.stroke();
  rCtx.fillStyle='rgba(0,200,255,0.95)';rCtx.font='bold 11px monospace';rCtx.fillText('KPMP',mx+8,my+4);
  document.getElementById('radar-timestamp').textContent=new Date(time).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZoneName:'short'});
}

function startRadar(){rTimer=setInterval(()=>{rIdx=(rIdx+1)%rImgs.length;drawFrame(rIdx)},600);drawFrame(rIdx)}
function toggleRadarPlayback(){rPlay=!rPlay;document.getElementById('radar-play-btn').textContent=rPlay?'⏸ PAUSE':'▶ PLAY';if(rPlay)startRadar();else clearInterval(rTimer)}

// ── ALERTS ───────────────────────────────────────────────────────────────────
let knownIds=new Set(),firstLoad=true,aCtx=null;
function getACtx(){if(!aCtx)aCtx=new(window.AudioContext||window.webkitAudioContext)();return aCtx}
function chime(){try{const c=getACtx(),tones=[960,853,960];let t=c.currentTime;tones.forEach(f=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=f;g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.start(t);o.stop(t+0.35);t+=0.38})}catch(e){}}
function sevClass(ev){const e=ev.toLowerCase();if(e.includes('warning'))return 'warning';if(e.includes('watch'))return 'watch';if(e.includes('advisory'))return 'advisory';return 'statement'}

async function loadAlerts(){
  const body=document.getElementById('alerts-body');
  try{
    const d=await(await fetchT('https://api.weather.gov/alerts/active?status=actual&message_type=alert&area=FL')).json();
    const marine=/marine|coastal flood|beach hazard|high surf|lake wind|small craft|gale|hazardous seas|dense water fog/i;
    const land=d.features.filter(f=>!marine.test(f.properties.event));
    land.sort((a,b)=>new Date(b.properties.sent)-new Date(a.properties.sent));
    const newIds=new Set(land.map(f=>f.id));
    if(!firstLoad){const novel=land.filter(f=>!knownIds.has(f.id)&&sevClass(f.properties.event)==='warning');if(novel.length)chime()}
    knownIds=newIds;firstLoad=false;
    const badge=document.getElementById('alerts-count-badge');
    if(!land.length){badge.textContent='NONE ACTIVE';badge.className='no-alerts-badge';body.innerHTML='<div id="alerts-empty"><span class="big">✓</span><span>No Active Land Alerts for Florida</span></div>';return}
    badge.textContent=land.length+' ACTIVE';badge.className='alert-count-badge';
    body.innerHTML=land.map(f=>{
      const p=f.properties,cls=sevClass(p.event);
      const area=p.areaDesc?p.areaDesc.split(';').slice(0,4).join('; '):'';
      const iss=p.sent?new Date(p.sent).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'--';
      const exp=p.expires?new Date(p.expires).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'--';
      return `<div class="alert-card ${cls}"><div class="alert-event"><span class="alert-badge badge-${cls}">${cls.toUpperCase()}</span>${p.event}</div><div class="alert-meta">Issued: ${iss} · Expires: ${exp}</div><div class="alert-area">${area}</div></div>`;
    }).join('');
  }catch(e){body.innerHTML='<div style="padding:20px;color:var(--text-dim);font-family:var(--font-mono);font-size:0.7rem">Unable to load alerts</div>'}
}

// ── FORECAST ─────────────────────────────────────────────────────────────────
const ICONS={sunny:'☀️',clear:'🌙','mostly sunny':'🌤️','partly sunny':'⛅','partly cloudy':'⛅','mostly cloudy':'🌥️',cloudy:'☁️',overcast:'☁️',rain:'🌧️',showers:'🌦️',thunderstorm:'⛈️',thunder:'⛈️',isolated:'🌦️',scattered:'🌦️',fog:'🌫️',wind:'💨',hurricane:'🌀',tropical:'🌀',snow:'❄️'};
function getIcon(s){const l=(s||'').toLowerCase();for(const[k,v]of Object.entries(ICONS))if(l.includes(k))return v;return'🌡️'}

async function loadForecast(){
  const el=document.getElementById('forecast-cards');
  try{
    let url=`https://api.weather.gov/gridpoints/${NWS_GRID_WFO}/${NWS_GRID_X},${NWS_GRID_Y}/forecast`;
    try{const pr=await fetchT(`https://api.weather.gov/points/${KPMP_LAT},${KPMP_LON}`,8000);if(pr.ok){const pd=await pr.json();if(pd.properties?.forecast)url=pd.properties.forecast}}catch(e){}
    const periods=(await(await fetchT(url,12000)).json()).properties.periods.slice(0,14);
    el.innerHTML=periods.map((p,i)=>{
      const pop=p.probabilityOfPrecipitation?.value;
      return `<div class="fc-card${i===0&&!p.isDaytime?' tonight':''}"><div class="fc-period">${p.name}</div><div class="fc-icon">${getIcon(p.shortForecast)}</div><div class="fc-temp">${p.temperature}°${p.temperatureUnit}</div><div class="fc-desc">${p.shortForecast}</div>${pop!=null?`<div class="fc-pop">💧 ${pop}%</div>`:''}</div>`;
    }).join('');
  }catch(e){el.innerHTML='<div style="padding:20px;color:var(--text-dim);font-family:var(--font-mono);font-size:0.7rem">Unable to load forecast</div>'}
}

// ── AIRPORTS ──────────────────────────────────────────────────────────────────
async function fetchMETAR(id){const r=await fetchT(`https://api.weather.gov/stations/${id}/observations/latest`);if(!r.ok)throw new Error(id);return(await r.json()).properties}

function aptCard(apt,p){
  const wMph=toMph(p.windSpeed?.value,p.windSpeed?.unitCode);
  const gMph=toMph(p.windGust?.value,p.windGust?.unitCode);
  const vis=p.visibility?.value,sky=p.cloudLayers;
  const visMi=vis!=null?parseFloat(m2mi(vis)):99;
  const cat=flightCat(getCeil(sky),visMi);
  const skyTxt=sky&&sky.length?sky.filter(l=>l.skyCover!=='CLR').map(l=>`${l.skyCover}${l.base?.value?' '+Math.round(l.base.value*3.28084/100)*100+'ft':''}`).join(' ')||'CLR':'CLR';
  const tF=p.temperature?.value!=null?cToF(p.temperature.value)+'°':'--';
  const dF=p.dewpoint?.value!=null?cToF(p.dewpoint.value)+'°':'--';
  const wStr=wMph!=null?`${compass(p.windDirection?.value??0)} ${wMph}mph`:'--';
  return `<div class="apt-card ${cat}"><div class="apt-row1"><span class="apt-id">${apt.id}</span><span class="apt-cat ${cat}">${cat.toUpperCase()}</span></div><div class="apt-name">${apt.name}</div><div class="apt-stats"><div class="apt-stat"><span>TMP </span>${tF}</div><div class="apt-stat"><span>DEW </span>${dF}</div><div class="apt-stat"><span>WND </span>${wStr}${gMph?' G'+gMph:''}</div><div class="apt-stat"><span>VIS </span>${visMi<99?visMi+'mi':'--'}</div></div><div class="apt-sky">${skyTxt}</div></div>`;
}
function aptErr(apt){return `<div class="apt-card unknown"><div class="apt-row1"><span class="apt-id">${apt.id}</span></div><div class="apt-name">${apt.name}</div><div class="apt-sky" style="margin-top:6px;color:var(--text-dim)">No data</div></div>`}

async function loadAirports(){
  const body=document.getElementById('airports-body');
  const all=[...SOUTH_FL,...STATE_FL];
  const res=await Promise.allSettled(all.map(a=>fetchMETAR(a.id)));
  let h='<div class="airport-tier-label">▸ South Florida</div><div class="airport-grid primary">';
  SOUTH_FL.forEach((a,i)=>{h+=res[i].status==='fulfilled'?aptCard(a,res[i].value):aptErr(a)});
  h+='</div><div class="airport-tier-label">▸ Florida Statewide</div><div class="airport-grid secondary">';
  STATE_FL.forEach((a,i)=>{h+=res[SOUTH_FL.length+i].status==='fulfilled'?aptCard(a,res[SOUTH_FL.length+i].value):aptErr(a)});
  h+='</div>';
  body.innerHTML=h;
}

// ── ENSEMBLE ──────────────────────────────────────────────────────────────────
async function loadEnsemble(){
  const body=document.getElementById('ensemble-body');
  try{
    const url=`https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${KPMP_LAT}&longitude=${KPMP_LON}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&models=gfs_seamless,ecmwf_ifs04,icon_seamless,gem_seamless&timezone=America%2FNew_York&forecast_days=4`;
    const d=await(await fetchT(url,20000)).json();
    const days=d.daily.time.slice(0,3);
    const mk=Object.keys(d.daily).filter(k=>k!=='time');
    const hk=mk.filter(k=>k.startsWith('temperature_2m_max'));
    const lk=mk.filter(k=>k.startsWith('temperature_2m_min'));
    const pk=mk.filter(k=>k.startsWith('precipitation_sum'));
    const vals=(keys,i)=>keys.map(k=>d.daily[k][i]).filter(v=>v!=null);
    const p50=v=>{const s=[...v].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]};
    const spr=v=>{const s=[...v].sort((a,b)=>a-b);return s[Math.floor(s.length*.9)]-s[Math.floor(s.length*.1)]};
    const toF=c=>c*9/5+32;
    const conf=sp=>sp<2?'<span class="ens-conf conf-high">HIGH</span>':sp<4?'<span class="ens-conf conf-med">MED</span>':'<span class="ens-conf conf-low">LOW</span>';
    const tCls=f=>f>=90?'hot':f>=75?'warm':'cool';
    const pCls=p=>p>=60?'pop-hi':p>=30?'pop-mid':'pop-lo';
    const lbls=['Today','Tomorrow',new Date(days[2]+'T12:00:00').toLocaleDateString('en-US',{weekday:'long'})];

    let h='<div class="ens-grid">';
    days.forEach((ds,i)=>{
      const hv=vals(hk,i),lv=vals(lk,i),pv=vals(pk,i);
      if(!hv.length)return;
      const hF=Math.round(toF(p50(hv))),lF=Math.round(toF(p50(lv)));
      const pop=Math.round(pv.filter(v=>v*0.0394>0.01).length/pv.length*100);
      const dl=new Date(ds+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      h+=`<div class="ens-day">
        <div><div class="ens-day-label">${lbls[i]}</div><div class="ens-date">${dl}</div></div>
        <div class="ens-temps">
          <div class="ens-temp-col"><span class="ens-col-label">HIGH</span><span class="ens-val ${tCls(hF)}">${hF}°</span>${conf(spr(hv))}</div>
          <div class="ens-temp-col"><span class="ens-col-label">LOW</span><span class="ens-val ${tCls(lF)}">${lF}°</span>${conf(spr(lv))}</div>
          <div class="ens-temp-col"><span class="ens-col-label">POP</span><span class="ens-pop ${pCls(pop)}">${pop}%</span></div>
        </div>
      </div>`;
    });
    h+='</div><div id="ens-footer"><span>GFS · ECMWF · ICON · GEM ensemble</span><a id="ens-link" href="https://howpomp.github.io/TempPronKPMP/" target="_blank">↗ Full Detail · TempPronKPMP</a></div>';
    body.innerHTML=h;
  }catch(e){body.innerHTML='<div style="padding:20px;color:var(--text-dim);font-family:var(--font-mono);font-size:0.7rem">Unable to load ensemble data</div>'}
}

// ── MAIN ─────────────────────────────────────────────────────────────────────
function updateFooter(){document.getElementById('footer-updated').textContent='Last updated: '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}

async function loadAll(){
  updateFooter();
  await Promise.allSettled([loadChips(),loadAlerts(),loadForecast(),loadAirports(),loadEnsemble()]);
}

initRadar();
loadAll();
setInterval(loadAll,REFRESH_MS);
setInterval(fetchRadar,10*60*1000);
</script>
